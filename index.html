<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Statistica e JS</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f8f9fa; 
            color: #333; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        .controlli { 
            background: #fff; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            display: flex; 
            gap: 15px; 
            justify-content: center;
        }
        button { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            background-color: #007bff; 
            color: white; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background-color: #0056b3; transform: translateY(-2px); }
        #btnReset { background-color: #6c757d; }
        #btnReset:hover { background-color: #5a6268; }
        
        /* Stile del contenitore principale */
        #display-area { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
            transition: all 0.4s ease; 
        }
        #titolo { color: #2c3e50; font-size: 28px; margin-top: 0; }
        #paragrafo { font-size: 16px; line-height: 1.6; color: #555; text-align: left;}
        
        /* Classe per centrare il testo nel welcome */
        .testo-centrato { text-align: center !important; }
    </style>
</head>
<body>

    <div class="controlli">
        <button id="btnColore">Cambia Colori</button>
        <button id="btnDimensione">Testo +</button>
        <button id="btnTeoria">Mostra Teoria (Welford)</button>
        <button id="btnReset">Reset / Welcome</button>
    </div>

    <div id="display-area">
        <h2 id="titolo">Welcome</h2>
        <p id="paragrafo" class="testo-centrato">
            Benvenuto nel pannello di controllo.<br>
            Usa i pulsanti in alto per manipolare questa pagina HTML tramite JavaScript o per consultare gli appunti di Statistica Applicata.
        </p>
    </div>

    <script src="script.js"></script>

</body>
</html>
